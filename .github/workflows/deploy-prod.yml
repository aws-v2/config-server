name: Prod deployment.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  prod-test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        run: mvn clean

  prod-build-and-push:
    runs-on: ubuntu-latest
    needs: prod-test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/config-server:prod
          build-args: |
            SPRING_PROFILES_ACTIVE=prod

  prod-deploy:
    needs: prod-build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Deploy to EC2 via SSH.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          passphrase: ${{ secrets.PROD_SSH_PASSPHRASE }}
          script: |
            docker network create aws-prod-network || true
            docker pull qarani/config-server:prod
            docker stop config-server-prod || true
            docker rm config-server-prod || true
            docker run -d \
              --name config-server-prod \
              --network aws-prod-network \
              -p 8888:8888 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e PROD_SERVER_PORT=8888 \
              -e PROD_API_VERSION=/api/v1 \
              -e PROD_FRONTEND_URL=http://frontend:5173 \
              -e PROD_JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 \
              -e PROD_JWT_EXPIRATION=86400000 \
              -e PROD_NATS_URL=nats://nats-prod:4222 \
              -e PROD_NATS_USERNAME=nats-prod-user \
              -e PROD_NATS_PASSWORD=nats-prod-password \
              -e PROD_CONFIG_GIT_URI=https://github.com/Qarani-m/aws-configuration \
              -e PROD_CONFIG_GIT_LABEL=main \
              -e PROD_EUREKA_SERVER_URL=http://discovery-server-prod:8761/eureka \
              -e PROD_MANAGEMENT_INCLUDE=refresh,health,info \
              qarani/config-server:prod




