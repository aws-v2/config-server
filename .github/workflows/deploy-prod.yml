name: Prod deployment.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  prod-test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        run: mvn clean

  prod-build-and-push:
    runs-on: ubuntu-latest
    needs: prod-test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/config-server:prod
          build-args: |
            SPRING_PROFILES_ACTIVE=prod

  prod-deploy:
    needs: prod-build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy Config Server (Swarm)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e

            echo "Ensuring overlay network exists..."
            docker network create --driver overlay prod-overlay-net || true

            echo "Pulling latest image..."
            docker pull qarani/config-server:prod

            echo "Removing old service..."
            docker service rm config-server-prod || true

            echo "Deploying config-server-prod..."

            docker service create \
              --name config-server-prod \
              --network prod-overlay-net \
              --publish published=8888,target=8888 \
              --replicas 1 \
              --env SPRING_PROFILES_ACTIVE=prod \
              --env PROD_SERVER_PORT=8888 \
              --env PROD_API_VERSION=/api/v1 \
              --env PROD_FRONTEND_URL=http://frontend:5173 \
              --env PROD_JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 \
              --env PROD_JWT_EXPIRATION=86400000 \
              --env PROD_NATS_URL=nats://nats-prod:4222 \
              --env PROD_NATS_USERNAME=nats-prod-user \
              --env PROD_NATS_PASSWORD=nats-prod-password \
              --env PROD_CONFIG_GIT_URI=https://github.com/Qarani-m/aws-configuration \
              --env PROD_CONFIG_GIT_LABEL=main \
              --env PROD_EUREKA_SERVER_URL=http://discovery-server-prod:8761/eureka \
              --env PROD_MANAGEMENT_INCLUDE=refresh,health,info \
              qarani/config-server:prod

            echo "Config server deployed."

