name: Staging Deployment.

on:
  push:
    branches: [ "staging" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx.
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/config-server:staging
        build-args: |
          SPRING_PROFILES_ACTIVE=staging

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Staging via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker network create aws-staging-network || true
            docker pull qarani/config-server:staging
            docker stop config-server-staging || true
            docker rm config-server-staging || true
            docker run -d --name config-server-staging \
              --network aws-staging-network \
              -e SPRING_PROFILES_ACTIVE=staging \
              -e STAGING_SERVER_PORT=8888 \
              -e STAGING_API_VERSION=/api/v1 \
              -e STAGING_FRONTEND_URL=http://frontend-staging:5173 \
              -e STAGING_JWT_SECRET=staging-secret-key-change-this-in-production \
              -e STAGING_JWT_EXPIRATION=86400000 \
              -e STAGING_NATS_URL=nats://nats-staging:4222 \
              -e STAGING_NATS_USERNAME=config-server \
              -e STAGING_NATS_PASSWORD=config-secret \
              -e STAGING_CONFIG_GIT_URI=https://github.com/Qarani-m/aws-configuration \
              -e STAGING_CONFIG_GIT_LABEL=staging \
              -e STAGING_EUREKA_SERVER_URL=http://discovery-server-staging:8761/eureka \
              -e STAGING_MANAGEMENT_INCLUDE=refresh,health,info \
              -p 8888:8888 \
              qarani/config-server:staging