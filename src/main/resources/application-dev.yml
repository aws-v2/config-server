server:
  port: ${DEV_SERVER_PORT:8888}

api:
  version: ${DEV_API_VERSION:/api/v1}

frontend:
  url: ${DEV_FRONTEND_URL:http://localhost:5173}

jwt:
  secret: ${DEV_JWT_SECRET:dev-secret-key-change-this-in-production}
  expiration: ${DEV_JWT_EXPIRATION:86400000}

nats:
  url: ${DEV_NATS_URL:nats://localhost:4222}
  username: ${DEV_NATS_USERNAME:config-server}
  password: ${DEV_NATS_PASSWORD:config-secret}

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: ${DEV_CONFIG_GIT_URI:https://github.com/Qarani-m/aws-configuration}
          default-label: ${DEV_CONFIG_GIT_LABEL:dev}

eureka:
  client:
    service-url:
      defaultZone: ${DEV_EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: ${DEV_MANAGEMENT_INCLUDE:refresh,health,info}

logging:
  level:
    root: INFO
