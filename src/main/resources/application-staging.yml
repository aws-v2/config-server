server:
  port: ${STAGING_SERVER_PORT:8888}

api:
  version: ${STAGING_API_VERSION:/api/v1}

frontend:
  url: ${STAGING_FRONTEND_URL:http://frontend:5173}

jwt:
  secret: ${STAGING_JWT_SECRET:staging-secret-key-change-this-in-production}
  expiration: ${STAGING_JWT_EXPIRATION:86400000}

nats:
  url: ${STAGING_NATS_URL:nats://nats:4222}
  username: ${STAGING_NATS_USERNAME:config-server}
  password: ${STAGING_NATS_PASSWORD:config-secret}

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: ${STAGING_CONFIG_GIT_URI:https://github.com/Qarani-m/aws-configuration}
          default-label: ${STAGING_CONFIG_GIT_LABEL:staging}

eureka:
  client:
    service-url:
      defaultZone: ${STAGING_EUREKA_SERVER_URL:http://discovery-server:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: ${STAGING_MANAGEMENT_INCLUDE:refresh,health,info}

logging:
  level:
    root: INFO
